<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WeatherLens | Live Weather Tracker</title>
  <meta name="description" content="Live weather tracking app using OpenWeather API. Built with HTML, CSS, and JavaScript.">
  <meta name="author" content="Shivam Upadhyay">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body class="light">

  <!-- Animated background particles -->
  <div class="bg-layer" id="bgLayer"></div>

  <!-- Top bar -->
  <header class="topbar">
    <div class="brand">🌤 WeatherLens</div>
    <div class="topbar-right">
      <span id="liveClock" class="clock"></span>
      <button onclick="toggleTheme()" class="toggle-theme" id="themeBtn" aria-label="Toggle theme">🌙</button>
    </div>
  </header>

  <!-- Main App -->
  <main class="app-wrapper">

    <!-- Search Panel -->
    <section class="search-panel">
      <h1 class="headline">What's the <em>weather</em> like?</h1>
      <div class="search-bar">
        <input type="text" id="cityInput" placeholder="Search city..." autocomplete="off" spellcheck="false">
        <button class="btn-search" onclick="searchCity()">Search</button>
      </div>
      <div class="btn-row">
        <button class="btn-outline" onclick="getLocation()">📍 My Location</button>
        <button class="btn-outline" onclick="clearHistory()">🗑 Clear History</button>
      </div>

      <!-- Recent Searches -->
      <div id="recentSearches" class="recent-searches"></div>
    </section>

    <!-- Weather Result -->
    <section id="weatherResult" class="result-panel hidden"></section>

    <!-- 5-Day Forecast -->
    <section id="forecastPanel" class="forecast-panel hidden">
      <h2 class="section-title">5-Day Forecast</h2>
      <div id="forecastCards" class="forecast-cards"></div>
    </section>

    <!-- Extra Stats -->
    <section id="statsPanel" class="stats-panel hidden">
      <h2 class="section-title">Detailed Stats</h2>
      <div id="statsGrid" class="stats-grid"></div>
    </section>

  </main>

  <footer class="footer">Built by Shivam Upadhyay &nbsp;·&nbsp; Powered by OpenWeather</footer>

  <script src="script.js"></script>
</body>
</html>
